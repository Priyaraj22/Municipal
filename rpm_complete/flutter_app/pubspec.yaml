name: rajapalayam_survey
description: Rajapalayam Municipality Family Survey System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.1

  # Persistent token storage
  shared_preferences: ^2.2.2

  # Charts
  fl_chart: ^0.67.0

  # File saving / open
  path_provider: ^2.1.1
  open_file: ^3.3.2
  share_plus: ^10.1.0
  permission_handler: ^11.3.1

  # Excel & XML
  excel: ^4.0.6
  xml: ^6.5.0

  # Date formatting
  intl: ^0.19.0

  # Photo Evidence
  image_picker: ^1.1.2

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
